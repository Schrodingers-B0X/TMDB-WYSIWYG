<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    // Dynamic Base Tag: Fixes subdirectory deployment issues (e.g. /tmdb_editor/)
    // 1. Get the current path (e.g. "/tmdb_editor/" or "/tmdb_editor/index.html")
    var base = window.location.pathname;
    
    // 2. If it refers to a file (has extension), strip the filename to get the directory
    if (base.indexOf('.') !== -1) {
        base = base.substring(0, base.lastIndexOf('/') + 1);
    }
    
    // 3. Ensure it ends with a slash (crucial for relative paths like ./src/...)
    if (!base.endsWith('/')) {
        base += '/';
    }
    
    // 4. Inject the base tag
    document.write('<base href="' + base + '" />');
  </script>
  <title>TMDB Layout Editor V4</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      font-family: 'Inter', sans-serif;
    }
    /* Custom scrollbar for a polished look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0d253f; /* TMDB Dark Blue */
    }
    ::-webkit-scrollbar-thumb {
      background: #254261; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #395b80; 
    }
    /* Hide number input spinners */
    input[type='number']::-webkit-inner-spin-button,
    input[type='number']::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type='number'] {
      -moz-appearance: textfield;
    }
  </style>
